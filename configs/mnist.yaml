# MNIST / Theory Verification 主配置

experiment:
  name: "sama_dfl"
  seed: 42
  device: "cuda"

# 联邦学习配置
federated:
  num_clients: 20
  byzantine_ratio: 0.2
  num_rounds: 150
  local_epochs: 1
  batch_size: 128
  num_workers: 4

# 数据配置
data:
  dataset: "mnist"
  data_dir: "./data"
  non_iid_alpha: 0.1

# 网络拓扑
topology:
  type: "mesh"
  degree: 6

# 模型配置
model:
  name: "simple_cnn"
  num_classes: 10

# 优化器配置
optimizer:
  type: "sgd"
  lr: 0.01
  momentum: 0.0
  weight_decay: 0.0

# SAMA-DFL
sama:
  alpha: 0.5
  use_temperature: false
  tau_max: 1.0
  tau_min: 0.01
  trust_layers: ["fc2.weight", "fc2.bias"]
  adaptive_alpha: false

# BALANCE
balance:
  alpha: 0.5
  gamma: 3.0
  kappa: 0.1

# SCCLIP
scclip:
  alpha: 0.5
  clip_constant: 0.1

# FedAvg
fedavg:
  alpha: 0.5

# Krum / Multi-Krum
krum:
  alpha: 0.5
  byzantine_ratio: 0.2

multi_krum:
  alpha: 0.5
  byzantine_ratio: 0.2
  multi_k: 5

# Trimmed Mean
trimmed_mean:
  alpha: 0.5
  trim_ratio: 0.1

# Coordinate Median
coord_median:
  alpha: 0.5

# 攻击配置
attack:
  type: "label_flipping"
  gaussian_std: 10.0
  amplification: 2.0
  trim_ratio: 0.1

# 日志配置
logging:
  log_interval: 10
  save_model: false
  save_dir: "./results"

# 理论验证实验配置
theory_verification:
  skip_initial_rounds: 10
  measurement_rounds: 100
  num_rounds_convergence: 300
  num_rounds_kappa: 200
  num_rounds_consensus: 400
  num_rounds_lyapunov: 300
  batch_size: 32
  num_workers: 0
  lr: 0.01
  gaussian_attack_std: 10.0
  num_clients: 20
  byzantine_ratio: 0.2
  alpha_dirichlet: 0.1
  topology: "mesh"
  mesh_degree: 6
  kappa_filter_max: 10.0
  lyapunov_rho: 0.1
