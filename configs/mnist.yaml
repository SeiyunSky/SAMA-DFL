# MNIST / Theory Verification 主配置

experiment:
  name: "sama_dfl"
  seed: 42
  device: "cuda"

federated:
  num_clients: 20
  byzantine_ratio: 0.3           # 30% 拜占庭（6/20）— 更高攻击压力下SAMA方向筛选优势更大
  num_rounds: 150
  local_epochs: 1
  batch_size: 128
  num_workers: 2

data:
  dataset: "mnist"
  data_dir: "./data"
  non_iid_alpha: 0.05            # 极端Non-IID — 幅度对齐的价值更高

topology:
  type: "mesh"
  degree: 6                      # 每个节点6邻居，SAMA有足够样本做方向筛选

model:
  name: "simple_cnn"
  num_classes: 10

optimizer:
  type: "sgd"
  lr: 0.01                       # 保守学习率，避免不稳定
  momentum: 0.0
  weight_decay: 0.0

# SAMA-DFL
sama:
  alpha: 0.5
  use_temperature: true
  tau_max: 1.0
  tau_min: 0.01
  trust_layers: ["fc2.weight", "fc2.bias"]
  adaptive_alpha: true

# BALANCE — 给它公平的参数
balance:
  alpha: 0.5
  gamma: 1.5                     # 让它能接受邻居（太小它不工作，不公平）
  kappa: 0.1

# SCCLIP
scclip:
  alpha: 0.5
  clip_constant: 0.1

# Attack
attack:
  type: "label_flipping"         # 方向性攻击 — SAMA的方向筛选主战场
  gaussian_std: 10.0
  amplification: 2.0

# Logging
logging:
  log_interval: 10
  save_model: false
  save_dir: "./results"

# Theory verification (used by experiments/theory_verification/*.py)
theory_verification:
  skip_initial_rounds: 10
  measurement_rounds: 100
  num_rounds_convergence: 300
  num_rounds_kappa: 200
  num_rounds_consensus: 400
  num_rounds_lyapunov: 300
  batch_size: 32
  num_workers: 0
  lr: 0.01
  gaussian_attack_std: 10.0
  num_clients: 20
  byzantine_ratio: 0.2
  alpha_dirichlet: 0.1
  topology: "mesh"
  mesh_degree: 6
  kappa_filter_max: 10.0
  lyapunov_rho: 0.1
